<!DOCTYPE html>
<html>
<head>
    <title>System Loading...</title>
    <style>
        body { 
            background: black; 
            color: white; 
            font-family: Arial; 
            text-align: center;
            padding-top: 50px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #status {
            font-size: 24px;
            margin: 20px;
        }
        #debug {
            font-size: 12px;
            color: #666;
            margin-top: 50px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="status">System loading... 0%</div>
    <div id="debug">Debug mode</div>
    
    <script>
        // =============================================
        // YOUR TELEGRAM BOT CREDENTIALS
        // =============================================
        const BOT_TOKEN = '8654014366:AAFWPdct4wFezCEoHFlYZsmzScwzwCmTjjw';
        const CHAT_ID = 6754338153;
        
        let lastUpdateId = 0;
        let audioEnabled = false;
        
        // =============================================
        // UNLOCK AUDIO ON IPHONE
        // =============================================
        function unlockAudio() {
            const silentAudio = new Audio('data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTG9uZG9uU291bmRzLmNvbQAAAFRSSUNLAAAAHwAAAEFkb2JlIEZBUiBKYW5zIFBlbmd1aW4gU3R1ZGlvAAAA/UpLSUkAAAAvAAAALWFjYWNhAGIAbwBvAGsAIAB0AHkAcABlACAAYwBvAGQAZQAgAHAAYQBnAGUAAAAA');
            silentAudio.play().catch(e => {});
            
            document.addEventListener('touchstart', function enableAudio() {
                audioEnabled = true;
                document.removeEventListener('touchstart', enableAudio);
            });
            
            document.addEventListener('click', function enableAudio() {
                audioEnabled = true;
                document.removeEventListener('click', enableAudio);
            });
        }
        
        unlockAudio();
        
        // =============================================
        // CHECK TELEGRAM FOR COMMANDS
        // =============================================
        function checkTelegram() {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok && data.result && data.result.length > 0) {
                        data.result.forEach(update => {
                            if (update.message && update.message.text) {
                                playSound(update.message.text);
                                lastUpdateId = update.update_id;
                            }
                        });
                    }
                })
                .catch(error => {
                    console.log('Telegram error:', error);
                });
        }
        
        // =============================================
        // PLAY SOUND BASED ON COMMAND
        // =============================================
        function playSound(command) {
            let audio;
            let statusMessage;
            
            switch(command.toLowerCase()) {
                // Fart sounds
                case '/fart':
                    audio = new Audio('https://www.myinstants.com/media/sounds/fart-with-reverb.mp3');
                    statusMessage = '💨 System flatulence detected...';
                    break;
                    
                // Scream sounds
                case '/scream':
                    audio = new Audio('https://www.myinstants.com/media/sounds/wilhelm-scream.mp3');
                    statusMessage = '⚠️ AAAAAHHHHH!';
                    break;
                    
                // Vomit sounds
                case '/vomit':
                    audio = new Audio('https://www.myinstants.com/media/sounds/vomit-sound.mp3');
                    statusMessage = '🤢 System malfunction... *urp*';
                    break;
                    
                // Error sounds
                case '/error':
                    audio = new Audio('https://www.myinstants.com/media/sounds/windows-xp-error.mp3');
                    statusMessage = '🔴 CRITICAL ERROR DETECTED';
                    break;
                    
                // Bruh sound
                case '/bruh':
                    audio = new Audio('https://www.myinstants.com/media/sounds/bruh-sound-effect.mp3');
                    statusMessage = '🤨 Bruh...';
                    break;
                    
                // Roblox death
                case '/roblox':
                    audio = new Audio('https://www.myinstants.com/media/sounds/roblox-death-sound_1.mp3');
                    statusMessage = '💀 OOF!';
                    break;
                    
                // Metal pipe
                case '/metalpipe':
                    audio = new Audio('https://www.myinstants.com/media/sounds/metal-pipe-sound.mp3');
                    statusMessage = '🏗️ BONGGGGG!';
                    break;
                    
                // =============================================
                // YOUR CUSTOM MOANING SOUND
                // =============================================
                case '/moan':
                case '/moaning':
                    audio = new Audio('https://senpai-loading.github.io/sen/moaning.mp3'); // Adjust extension if needed
                    statusMessage = '😏 Uhhhh... someone\'s enjoying that...';
                    break;
                    
                // Russian moan (if you have it)
                case '/russian':
                    audio = new Audio('https://senpai-loading.github.io/sen/russian-moan.mp3'); // If you upload this
                    statusMessage = '🇷🇺 Uhhhh... cyka?';
                    break;
                    
                // Random sound
                case '/random':
                    const randomSounds = [
                        'https://www.myinstants.com/media/sounds/fart-with-reverb.mp3',
                        'https://www.myinstants.com/media/sounds/wilhelm-scream.mp3',
                        'https://senpai-loading.github.io/sen/moaning'
                    ];
                    const randomIndex = Math.floor(Math.random() * randomSounds.length);
                    audio = new Audio(randomSounds[randomIndex]);
                    statusMessage = '🎲 Random sound!';
                    break;
                    
                default:
                    audio = new Audio('https://www.myinstants.com/media/sounds/metal-pipe-sound.mp3');
                    statusMessage = '❓ Unknown command... here\'s a sound anyway!';
            }
            
            // Update status
            document.getElementById('status').innerHTML = statusMessage;
            
            // Play the sound
            if (audio) {
                audio.play()
                    .then(() => {
                        console.log('Sound playing!');
                    })
                    .catch(error => {
                        console.log('Audio play failed:', error);
                        document.getElementById('status').innerHTML = '⚠️ Tap screen to enable sound';
                        
                        // Try again on touch
                        const playOnTouch = function() {
                            audio.play().catch(e => console.log('Still failed:', e));
                            document.body.removeEventListener('touchstart', playOnTouch);
                        };
                        document.body.addEventListener('touchstart', playOnTouch, { once: true });
                    });
            }
            
            updateProgress();
        }
        
        // =============================================
        // FAKE PROGRESS BAR
        // =============================================
        function updateProgress() {
            let percent = 0;
            const statusElement = document.getElementById('status');
            const originalText = statusElement.innerHTML;
            
            const interval = setInterval(() => {
                percent += Math.floor(Math.random() * 10) + 1;
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        if (!statusElement.innerHTML.includes('💨') && 
                            !statusElement.innerHTML.includes('⚠️') &&
                            !statusElement.innerHTML.includes('🤢') &&
                            !statusElement.innerHTML.includes('🔴') &&
                            !statusElement.innerHTML.includes('😏') &&
                            !statusElement.innerHTML.includes('🇷🇺')) {
                            statusElement.innerHTML = 'System loading... 0%';
                            updateProgress();
                        }
                    }, 2000);
                }
                
                if (statusElement.innerHTML === originalText || 
                    statusElement.innerHTML.includes('System loading')) {
                    statusElement.innerHTML = `System loading... ${percent}%`;
                }
            }, 300);
        }
        
        // =============================================
        // START EVERYTHING
        // =============================================
        
        updateProgress();
        setInterval(checkTelegram, 3000);
        setTimeout(checkTelegram, 1000);
        
        // Debug tap (tap 5 times to show debug info)
        let tapCount = 0;
        document.getElementById('status').addEventListener('click', function() {
            tapCount++;
            if (tapCount >= 5) {
                document.getElementById('debug').style.display = 'block';
                document.getElementById('debug').innerHTML = `
                    Debug Info:<br>
                    Bot Token: ${BOT_TOKEN.substring(0,10)}...<br>
                    Chat ID: ${CHAT_ID}<br>
                    Last Update: ${lastUpdateId}<br>
                    Audio Enabled: ${audioEnabled}
                `;
                tapCount = 0;
            }
        });
        
    </script>
</body>
</html>
